name: Bug report
description: Report a reproducible problem
title: "[Bug] "
labels: ["type:bug", "status:backlog"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug clearly.
      placeholder: A clear and concise description.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Web app (app/)
        - Mobile Flutter (flutter/)
        - Scripts/Infra
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs/screenshots
      description: Paste stack traces and add screenshots if available.
